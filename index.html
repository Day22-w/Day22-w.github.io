  <style>

      --main-width: 960px;
      --card-bg: #fff;
      --primary: #214478;
      --secondary: #547ca8;
      --accent: #e6eaf0;
      --bg: #f2f3f5;
      --text: #2d3557;
      --text-light: #555;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ========== Header Banner ========== */
    .header-banner {
      width: 100%;
      height: 320px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #1a2a4a 0%, #2d4a7a 40%, #547ca8 100%);
      box-shadow: 0 3px 32px rgba(50,62,104,0.12);
    }
    .header-banner::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.05)" d="M0,160L48,170.7C96,181,192,203,288,197.3C384,192,480,160,576,149.3C672,139,768,149,864,170.7C960,192,1056,224,1152,218.7C1248,213,1344,171,1392,149.3L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"/></svg>') no-repeat bottom center;
      background-size: cover;
    }
    @media (max-width: 800px) { .header-banner { height: 160px; } }

    /* ========== Language Switcher ========== */
    .lang-switcher {
      position: absolute;
      top: 16px;
      right: 32px;
      z-index: 100;
      display: flex;
      gap: 6px;
    }
    .lang-btn {
      background: none;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 2px;
      border-radius: 50%;
      transition: all 0.3s;
      line-height: 0;
    }
    .lang-btn img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: block;
    }
    .lang-btn:hover, .lang-btn.is-active {
      border-color: #fff;
      transform: scale(1.15);
    }
    @media (max-width: 600px) {
      .lang-switcher { right: 12px; top: 10px; gap: 4px; }
      .lang-btn img { width: 28px; height: 28px; }
    }

    /* ========== Main Card ========== */
    .main-content {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 10;
    }
    .main-card {
      margin: -80px auto 48px auto;
      width: 100%;
      max-width: var(--main-width);
      background: var(--card-bg);
      box-shadow: 0 8px 32px rgba(33,44,78,0.09), 0 2.5px 16px rgba(82,125,155,0.08);
      border-radius: 20px;
      padding: 40px 60px;
    }
    @media (max-width: 880px) { .main-card { padding: 32px 6vw; margin-top: -40px; } }
    @media (max-width: 600px) { .main-card { padding: 20px 4vw; border-radius: 12px; } }

    /* ========== Avatar & Name ========== */
    .avatar {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      display: block;
      margin: 0 auto 24px auto;
      border: 4px solid #fff;
      box-shadow: 0 8px 24px rgba(33,44,78,0.15);
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      font-size: 48px;
      font-weight: 700;
      line-height: 122px;
      text-align: center;
    }
    .name {
      text-align: center;
      font-size: 36px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      font-size: 17px;
      color: var(--text-light);
      margin-bottom: 40px;
      font-weight: 500;
    }

    /* ========== Sections ========== */
    .section { margin: 0 auto 36px auto; max-width: var(--main-width); }
    .section-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title .icon { font-size: 24px; }

    /* ========== Contact ========== */
    .contact-row {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      font-size: 16px;
      color: #444;
    }
    .contact-row span { display: flex; align-items: center; gap: 6px; }
    .contact-row a { color: var(--secondary); text-decoration: none; }
    .contact-row a:hover { text-decoration: underline; }

    /* ========== Info List ========== */
    .info-list { list-style: none; padding: 0; }
    .info-list li {
      font-size: 16px;
      line-height: 2;
      color: var(--text);
      padding-left: 16px;
      position: relative;
    }
    .info-list li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: var(--secondary);
      font-weight: bold;
    }

    /* ========== Bio ========== */
    .bio {
      font-size: 15.5px;
      color: #374577;
      line-height: 2;
      background: #f8f9fc;
      border-radius: 12px;
      padding: 18px 22px;
      border-left: 4px solid var(--secondary);
    }

    /* ========== Skills ========== */
    .skills-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
    .skill-tag {
      background: linear-gradient(135deg, #eef2f9, #e6eaf0);
      color: var(--primary);
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid #d8dfe8;
    }

    /* ========== Campus Experience ========== */
    .exp-item {

      margin-bottom: 12px;

function renderLang(lang) {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (!dict[key] || !dict[key][lang]) return;
    if (el.getAttribute('data-html') === 'true') {
      el.innerHTML = dict[key][lang];
    } else {
      el.textContent = dict[key][lang];
    }
  });
  document.title = dict.name[lang] + ' | ' + dict.subtitle[lang];
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('is-active', btn.getAttribute('data-lang') === lang);
  });
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : lang;
  localStorage.setItem('site_lang', lang);
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => renderLang(btn.getAttribute('data-lang')));
});

const saved = localStorage.getItem('site_lang');
renderLang(saved && dict.name[saved] ? saved : 'zh');
document.getElementById('year').textContent = new Date().getFullYear();
